<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gimont Header Exact</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

/* ===== TOP RED BAR ===== */
.top-bar{
  width:100%;
  background:#d71920;
  color:#fff;
  font-size:14px;
}
.top-bar .inner{
  max-width:1200px;
  margin:auto;
  padding:10px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.top-left span{
  margin-right:25px;
}
.top-right span{
  margin-left:20px;
}

/* ===== NAVBAR ===== */
.header{
  width:100%;
  background:#fff;
  border-bottom:1px solid #eee;
}
.header-inner{
  max-width:1200px;
  margin:auto;
  display:flex;
  align-items:center;
  height:90px;
}

/* LOGO */
.logo{
  display:flex;
  align-items:center;
  padding:0 15px;
}
.logo img{
  height:42px;
}

/* MENU */
.nav{
  display:flex;
  gap:32px;
  margin-left:20px;
  flex:1;
}
.nav a{
  text-decoration:none;
  color:#333;
  font-size:15px;
  font-weight:500;
}
.nav a.active{
  color:#d71920;
}

/* RIGHT INFO */
.right-info{
  display:flex;
  align-items:center;
  gap:25px;
  padding-right:15px;
}
.phone{
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:600;
  color:#0a2c6d;
}

/* SEARCH */
.search{
  font-size:18px;
  cursor:pointer;
}

/* REPORT ISSUE */
.report-issue{
  background:#d71920;
  color:#fff;
  height:90px;
  padding:0 32px;
  display:flex;
  align-items:center;
  font-weight:600;
  white-space:nowrap;
}

/* ===== HERO ===== */
.hero{
  position:relative;
  height:560px;
  background:url("https://images.unsplash.com/photo-1502602898657-3e91760cbb34") center/cover no-repeat;
}
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(20,30,60,.65);
}
.hero-content{
  position:relative;
  z-index:2;
  max-width:1200px;
  margin:auto;
  height:100%;
  padding:0 15px;
  display:flex;
  align-items:center;
}
.hero h1{
  color:#fff;
  font-size:70px;
  line-height:1.1;
}
.hero h1 span{
  font-weight:300;
}
.hero .btn{
  display:inline-block;
  margin-top:30px;
  background:#d71920;
  color:#fff;
  padding:15px 32px;
  text-decoration:none;
  font-weight:600;
}

/* SLIDER BUTTONS RIGHT SIDE */
.slider-btns{
  position:absolute;
  right:30px;
  top:50%;
  transform:translateY(-50%);
  z-index:3;
  display:flex;
  flex-direction:column;
  gap:14px;
}
.slider-btns div{
  width:44px;
  height:44px;
  border-radius:50%;
  background:rgba(255,255,255,.35);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
}

/* ===== RESPONSIVE ===== */
@media(max-width:992px){
  .nav{display:none;}
  .hero h1{font-size:52px;}
}
@media(max-width:768px){
  .header-inner{flex-wrap:wrap;height:auto;}
  .report-issue{
    width:100%;
    justify-content:center;
    height:60px;
  }
  .hero{height:450px;}
  .hero h1{font-size:40px;}
}
@media(max-width:480px){
  .hero h1{font-size:32px;}
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="inner">
    <div class="top-left">
      <span>✉ needhelp@company.com</span>
      <span>📍 88 Brooklyn Golden Street, New York</span>
    </div>
    <div class="top-right">
      <span>Council</span>
      <span>/ Government</span>
      <span>/ Complaints</span>
    </div>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">

    <div class="logo">
      <img src="https://i.imgur.com/6Z8FQJk.png" alt="GIMONT">
    </div>

    <nav class="nav">
      <a class="active" href="#">Home</a>
      <a href="#">Pages</a>
      <a href="#">Events</a>
      <a href="#">Departments</a>
      <a href="#">Documentation</a>
      <a href="#">Services</a>
    </nav>

    <div class="right-info">
      <div class="phone">📞 +92 (8800) 9850</div>
      <div class="search">🔍</div>
    </div>

    <div class="report-issue">Report Issues</div>

  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <div>
      <h1><span>WELCOME TO</span><br>GREEN CITY</h1>
      <a href="#" class="btn">Discover More</a>
    </div>
  </div>

  <div class="slider-btns">
    <div>&larr;</div>
    <div>&rarr;</div>
  </div>
</div>

</body>
</html>
